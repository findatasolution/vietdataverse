# Runs on the shared Hetzner box (alongside mythreel.studio) per box-multi-app-deploy.md.
# Own dir (~/vietdataverse) + own compose. Does NOT open 80/443 — the shared Caddy
# (in ~/automated_video) proxies in over the `edge` network via caddy-conf.d/vietdataverse.caddy.
# Prereqs (one-time box prep, see box-multi-app-deploy.md §1): 4G swap restored,
# `docker network create edge`, Caddy joined to `edge` + imports caddy-conf.d/*.caddy.
services:
  vietdataverse:
    build: .
    image: vietdataverse:latest
    container_name: vietdataverse
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"                 # internal only — Caddy reaches it as vietdataverse:8000 over `edge`
    mem_limit: 640m            # within the box's ~1.2G budget for new apps (FastAPI + pandas/genai)
    cpus: "1.0"                # don't steal vCPU during mythreel renders
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - default
      - edge

networks:
  edge:
    external: true
