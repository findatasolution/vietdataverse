<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh Email — Viet Dataverse</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; background: var(--bg, #faf8f3); }
        .verify-card { background: var(--surface, #fff); border-radius: 12px; padding: 2.5rem; max-width: 480px; width: 100%; text-align: center; border: 1px solid var(--border-cream, #e8dfd0); box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
        .verify-icon { font-size: 4rem; margin-bottom: 1rem; }
        .verify-title { font-size: 1.3rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--text-primary, #1a1a1a); }
        .verify-msg { color: var(--text-secondary, #6b6b6b); font-size: 0.95rem; line-height: 1.6; margin: 0; }
        .verify-btn { display: inline-block; background: var(--terracotta, #c0392b); color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 0.95rem; cursor: pointer; margin-top: 1.75rem; text-decoration: none; font-weight: 500; transition: opacity 0.15s; }
        .verify-btn:hover { opacity: 0.88; }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="verify-icon" id="verify-icon">&#9203;</div>
        <h1 class="verify-title" id="verify-title">Đang xác minh email...</h1>
        <p class="verify-msg" id="verify-msg"></p>
        <a href="/index.html" class="verify-btn" id="verify-cta" style="display:none;">Quay lại trang chủ</a>
    </div>

    <script>
        (async function () {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');

            var iconEl  = document.getElementById('verify-icon');
            var titleEl = document.getElementById('verify-title');
            var msgEl   = document.getElementById('verify-msg');
            var ctaEl   = document.getElementById('verify-cta');

            if (!token) {
                iconEl.textContent  = '❌';
                titleEl.textContent = 'Link không hợp lệ';
                msgEl.textContent   = 'Token bị thiếu trong URL. Kiểm tra lại email và click đúng link.';
                ctaEl.style.display = 'inline-block';
                return;
            }

            var apiBase = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                ? 'http://localhost:8000/api/v1'
                : location.origin + '/api/v1'; // same-origin: FE + API on the same box

            try {
                var res  = await fetch(apiBase + '/seller/verify-email?token=' + encodeURIComponent(token));
                var json = await res.json();

                if (res.ok) {
                    iconEl.textContent  = '✅';
                    titleEl.textContent = 'Email đã được xác minh!';
                    msgEl.textContent   = 'Bây giờ bạn có thể upload sản phẩm lên Knowledge Market.';
                    ctaEl.textContent   = 'Vào Knowledge Market';
                    ctaEl.href          = '/index.html#knowledge-market';
                } else {
                    iconEl.textContent  = '❌';
                    titleEl.textContent = 'Xác minh thất bại';
                    msgEl.textContent   = (json && json.detail) ? json.detail : 'Token hết hạn hoặc không hợp lệ. Hãy yêu cầu gửi lại email từ trang Knowledge Market.';
                }
            } catch (e) {
                iconEl.textContent  = '⚠️';
                titleEl.textContent = 'Lỗi kết nối';
                msgEl.textContent   = 'Không kết nối được đến server. Thử lại sau.';
            }

            ctaEl.style.display = 'inline-block';
        })();
    </script>
</body>
</html>
