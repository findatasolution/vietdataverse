<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat với dữ liệu VN — Viet Dataverse</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── Layout ── */
    body {
      background: #f5f4ed;
      font-family: 'Anthropic Sans', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-shell {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px 0;
      box-sizing: border-box;
    }

    /* ── Header ── */
    .chat-header {
      padding: 24px 0 16px;
      border-bottom: 1px solid #f0eee6;
    }
    .chat-header h1 {
      font-family: 'Anthropic Serif', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: #141413;
      margin: 0 0 4px;
    }
    .chat-header p {
      font-size: 0.875rem;
      color: #87867f;
      margin: 0;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 100%;
    }
    .msg-user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
    }
    .msg-user .msg-avatar {
      background: #e8e6dc;
      color: #4d4c48;
    }
    .msg-assistant .msg-avatar {
      background: linear-gradient(135deg, #c96442, #d97757);
      color: #faf9f5;
    }

    .msg-bubble {
      max-width: calc(100% - 50px);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9375rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-user .msg-bubble {
      background: #141413;
      color: #faf9f5;
      border-bottom-right-radius: 4px;
    }
    .msg-assistant .msg-bubble {
      background: #faf9f5;
      color: #141413;
      border: 1px solid #f0eee6;
      border-bottom-left-radius: 4px;
    }

    .msg-sources {
      font-size: 0.75rem;
      color: #87867f;
      margin-top: 6px;
      padding-left: 40px;
    }

    /* ── Thinking indicator ── */
    .msg-thinking .msg-bubble {
      background: #faf9f5;
      border: 1px solid #f0eee6;
    }
    .thinking-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .thinking-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #87867f;
      animation: blink 1.2s infinite both;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Rate limit pill ── */
    .rate-pill {
      text-align: center;
      font-size: 0.75rem;
      color: #87867f;
      padding: 6px 0;
    }
    .rate-pill span {
      background: #e8e6dc;
      border-radius: 24px;
      padding: 3px 12px;
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0 8px;
    }
    .sugg-chip {
      background: #faf9f5;
      border: 1px solid #e8e6dc;
      border-radius: 24px;
      padding: 6px 14px;
      font-size: 0.8125rem;
      color: #5e5d59;
      cursor: pointer;
      transition: background 120ms, color 120ms;
    }
    .sugg-chip:hover {
      background: #e8e6dc;
      color: #141413;
    }

    /* ── Input bar ── */
    .chat-input-bar {
      padding: 12px 0 20px;
      border-top: 1px solid #f0eee6;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-input-wrap {
      flex: 1;
      position: relative;
    }
    #chat-input {
      width: 100%;
      resize: none;
      border: 1px solid #e8e6dc;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.5;
      background: #faf9f5;
      color: #141413;
      outline: none;
      box-sizing: border-box;
      max-height: 140px;
      overflow-y: auto;
    }
    #chat-input:focus {
      border-color: #3898ec;
    }
    #chat-input::placeholder { color: #b0aea5; }

    #send-btn {
      background: #c96442;
      border: none;
      border-radius: 10px;
      color: #faf9f5;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 150ms;
    }
    #send-btn:hover:not(:disabled) { background: #d97757; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }

    /* ── Error banner ── */
    .chat-error {
      background: #fdf2f2;
      border: 1px solid #f5c2c2;
      border-radius: 8px;
      color: #b53333;
      font-size: 0.875rem;
      padding: 10px 14px;
      margin: 8px 0;
    }

    /* ── Empty state ── */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: 40px 0;
    }
    .chat-empty-icon {
      font-size: 2.5rem;
      line-height: 1;
    }
    .chat-empty h2 {
      font-family: 'Anthropic Serif', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 500;
      color: #141413;
      margin: 0;
    }
    .chat-empty p {
      font-size: 0.875rem;
      color: #87867f;
      margin: 0;
      max-width: 340px;
      line-height: 1.55;
    }

    /* ── Scrollbar ── */
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #e8e6dc; border-radius: 4px; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: #87867f;
      text-decoration: none;
      margin: 16px 16px 0;
    }
    .back-link:hover { color: #141413; }

    @media (max-width: 600px) {
      .chat-shell { padding: 0 12px 0; }
      .msg-bubble { font-size: 0.875rem; }
    }
  </style>
</head>
<body>

<a href="/fe/" class="back-link">
  <svg viewBox="0 0 16 16" width="14" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M10 12L6 8l4-4"/>
  </svg>
  Viet Dataverse
</a>

<div class="chat-shell">
  <div class="chat-header">
    <h1>Chat với dữ liệu VN</h1>
    <p>Hỏi về vàng, tỷ giá, lãi suất, CPI, cổ phiếu VN30 — có dữ liệu thực tế hôm nay.</p>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty" id="empty-state">
      <div class="chat-empty-icon">📊</div>
      <h2>Hỏi về tài chính VN</h2>
      <p>Tôi có dữ liệu vàng, tỷ giá, lãi suất, CPI cập nhật hàng ngày từ Viet Dataverse.</p>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div id="rate-bar" class="rate-pill" style="display:none"></div>
  <div id="error-bar" style="display:none"></div>

  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <textarea
        id="chat-input"
        placeholder="Hỏi về giá vàng, tỷ giá, lãi suất..."
        rows="1"
        maxlength="2000"
      ></textarea>
    </div>
    <button id="send-btn" disabled title="Gửi (Enter)">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M3.5 9.5l13-6-6 13-1.5-5.5z"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  const SUGGESTIONS = [
    "Giá vàng SJC hôm nay bao nhiêu?",
    "Lãi suất tiết kiệm ACB 12 tháng?",
    "Tỷ giá USD/VND đang ở mức nào?",
    "CPI Việt Nam tháng gần nhất?",
    "Nên gửi tiết kiệm kỳ hạn nào hiện tại?",
    "Vàng SJC premium so quốc tế đang bao nhiêu?",
  ];

  const API_BASE  = window.location.hostname === "localhost"
    ? "http://localhost:8000"
    : "https://api.vietdataverse.online";

  const messagesEl  = document.getElementById("chat-messages");
  const emptyEl     = document.getElementById("empty-state");
  const inputEl     = document.getElementById("chat-input");
  const sendBtn     = document.getElementById("send-btn");
  const rateBar     = document.getElementById("rate-bar");
  const errorBar    = document.getElementById("error-bar");
  const suggestionsEl = document.getElementById("suggestions");

  let history = [];
  let sending = false;

  // ── Suggestions ────────────────────────────────────────────────────────
  SUGGESTIONS.forEach(q => {
    const chip = document.createElement("button");
    chip.className = "sugg-chip";
    chip.textContent = q;
    chip.onclick = () => { inputEl.value = q; autoResize(); updateSend(); sendMessage(); };
    suggestionsEl.appendChild(chip);
  });

  // ── Input auto-resize ──────────────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  }
  function updateSend() {
    sendBtn.disabled = !inputEl.value.trim() || sending;
  }
  inputEl.addEventListener("input", () => { autoResize(); updateSend(); });
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });

  // ── Auth token ─────────────────────────────────────────────────────────
  function getAuthHeaders() {
    const tok = localStorage.getItem("auth_token") || localStorage.getItem("id_token");
    return tok ? { "Authorization": `Bearer ${tok}` } : {};
  }

  // ── DOM helpers ────────────────────────────────────────────────────────
  function appendMsg(role, text) {
    if (emptyEl) emptyEl.style.display = "none";

    const row = document.createElement("div");
    row.className = `msg msg-${role}`;

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "user" ? "U" : "VD";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return { row, bubble };
  }

  function appendThinking() {
    if (emptyEl) emptyEl.style.display = "none";
    const row = document.createElement("div");
    row.className = "msg msg-assistant msg-thinking";
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = "VD";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendSources(sources) {
    if (!sources || !sources.length) return;
    const div = document.createElement("div");
    div.className = "msg-sources";
    div.textContent = "Nguồn: " + sources.join(", ");
    messagesEl.appendChild(div);
  }

  function showError(msg) {
    errorBar.innerHTML = `<div class="chat-error">${msg}</div>`;
    errorBar.style.display = "block";
    setTimeout(() => { errorBar.style.display = "none"; }, 6000);
  }

  function updateRateBar(remaining) {
    if (remaining === null || remaining === undefined) { rateBar.style.display = "none"; return; }
    rateBar.style.display = "block";
    rateBar.innerHTML = `<span>Còn ${remaining} câu hỏi miễn phí trong giờ này</span>`;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send ───────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    sending = true;
    updateSend();

    appendMsg("user", text);
    history.push({ role: "user", content: text });

    inputEl.value = "";
    autoResize();
    updateSend();

    const thinkingRow = appendThinking();

    try {
      const body = {
        message:    text,
        session_id: _sessionId(),
        history:    history.slice(0, -1).slice(-6),
      };

      const res = await fetch(`${API_BASE}/api/v1/chat`, {
        method:  "POST",
        headers: { "Content-Type": "application/json", ...getAuthHeaders() },
        body:    JSON.stringify(body),
      });

      thinkingRow.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const { row, bubble } = appendMsg("assistant", data.answer);
      appendSources(data.sources);
      history.push({ role: "assistant", content: data.answer });
      if (history.length > 14) history = history.slice(-14);
      updateRateBar(data.remaining);

    } catch (e) {
      thinkingRow.remove();
      showError(e.message || "Lỗi không xác định. Thử lại sau.");
    } finally {
      sending = false;
      updateSend();
      inputEl.focus();
    }
  }

  function _sessionId() {
    let id = sessionStorage.getItem("vd_chat_sid");
    if (!id) {
      id = Math.random().toString(36).slice(2);
      sessionStorage.setItem("vd_chat_sid", id);
    }
    return id;
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.focus();
})();
</script>
</body>
</html>
