            <h1>Tải Dữ Liệu Vĩ Mô & Giá Vàng Việt Nam Miễn Phí | Viet Dataverse</h1>
            <p>Viet Dataverse là nền tảng dữ liệu tài chính và vĩ mô Việt Nam tập trung. Tải <strong>miễn phí</strong> dữ liệu vĩ mô: giá vàng SJC/DOJI/BTMC từ 2015, giá bạc Phú Quý, lãi suất tiết kiệm ngân hàng (ACB, VCB, CTG, SHB), lãi suất liên ngân hàng SBV và tỷ giá USD/VND Vietcombank — định dạng CSV hoặc JSON, API RESTful, cập nhật 2 lần mỗi ngày.</p>

            <h2>Dữ liệu có sẵn để tải miễn phí</h2>
            <ul>
                <li><strong>Giá Vàng Trong Nước</strong> — Lịch sử giá vàng SJC, DOJI HN, DOJI SG, BTMC từ 2015. Đơn vị: nghìn VND/chỉ (3.75g). Cập nhật 2 lần/ngày.</li>
                <li><strong>Giá Bạc Phú Quý</strong> — Lịch sử giá bạc thỏi Phú Quý tại thị trường Việt Nam. Đơn vị: nghìn VND/lượng.</li>
                <li><strong>Lãi Suất Liên Ngân Hàng SBV</strong> — Lãi suất qua đêm, 1 tuần, 1 tháng, 3 tháng, 6 tháng, 9 tháng do Ngân hàng Nhà nước Việt Nam công bố.</li>
                <li><strong>Lãi Suất Gửi Tiết Kiệm</strong> — ACB, VCB (Vietcombank), CTG (Vietinbank), SHB theo các kỳ hạn từ 1–36 tháng.</li>
                <li><strong>Tỷ Giá USD/VND</strong> — Tỷ giá mua/bán Vietcombank và tỷ giá trung tâm SBV.</li>
            </ul>

            <h2>Phân Tích Thị Trường Vàng & Bạc Việt Nam</h2>
            <p>Thị trường vàng Việt Nam vận hành theo cơ chế riêng biệt so với thế giới. Giá vàng trong nước được niêm yết theo đơn vị nghìn VND/chỉ (1 chỉ = 3.75g). Các thương hiệu uy tín gồm DOJI, SJC, BTMC — mỗi thương hiệu có giá mua vào và bán ra khác nhau tùy thời điểm thị trường. Khoảng cách giữa đường mua và bán (spread) phản ánh tính thanh khoản: spread rộng cho thấy thị trường biến động mạnh.</p>
            <p>Giá vàng trong nước chịu tác động bởi hai nhóm yếu tố: (1) Quốc tế — giá vàng thế giới COMEX (USD/oz), tỷ giá USD/VND, chính sách lãi suất Fed; (2) Trong nước — cung cầu vàng vật chất, chính sách nhập khẩu vàng của SBV, tâm lý tích trữ dịp Tết. Lịch sử cho thấy giá vàng SJC thường giao dịch ở mức chênh lệch đáng kể so với giá thế giới (premium), đôi khi lên 15–20 triệu đồng/lượng vào giai đoạn căng thẳng nguồn cung.</p>

            <h2>Lãi Suất Tiết Kiệm, Liên Ngân Hàng & Tỷ Giá USD/VND</h2>
            <p>Lãi suất tiết kiệm kỳ hạn (%/năm) theo các kỳ hạn từ 1 tháng đến 36 tháng tại ACB, VCB, CTG, SHB. Từ 2022–2023, lãi suất leo thang mạnh do áp lực lạm phát, đỉnh điểm vượt 9–10%/năm. Bước sang 2024–2025, Ngân hàng Nhà nước hạ lãi suất điều hành, kéo mặt bằng huy động về 4–6%/năm kỳ hạn ngắn.</p>
            <p>Lãi suất liên ngân hàng SBV phản ánh chi phí vay vốn ngắn hạn giữa các ngân hàng. Lãi suất qua đêm nhạy cảm nhất với thanh khoản tức thời — khi tăng đột biến là dấu hiệu căng thẳng thanh khoản hệ thống. Tỷ giá USD/VND do Vietcombank niêm yết được coi là tỷ giá tham chiếu chính thức của thị trường Việt Nam.</p>

            <h2>Vàng, Bạc & NASDAQ Quốc Tế</h2>
            <p>Giá vàng tương lai COMEX (GC=F, USD/troy oz) là chuẩn mực quốc tế. Các yếu tố dịch chuyển giá vàng COMEX: chính sách lãi suất Fed, chỉ số đô-la DXY, lạm phát CPI, căng thẳng địa chính trị. Bạc quốc tế (SI=F) có 50–60% nhu cầu từ công nghiệp (pin mặt trời, điện tử, y tế), khiến bạc nhạy cảm hơn với chu kỳ kinh tế toàn cầu. Chỉ số NASDAQ (^IXIC) đại diện cổ phiếu công nghệ — khi NASDAQ tăng, dòng tiền thường rút khỏi vàng, và ngược lại.</p>

            <h2>Download Gold Price Vietnam — Free API</h2>
            <p>Free API access: <a href="https://api.vietdataverse.online/api/docs">api.vietdataverse.online/api/docs</a></p>
            <p>Download gold price CSV, silver price, SBV interbank rates, term deposit rates, USD/VND exchange rate from 2015 to present. Suitable for economic research, investment analysis, and financial application development.</p>

            <h2>Thời báo 1 giây (1s Market Pulse)</h2>
            <p>Dòng tin tức tài chính được AI đọc và gắn nhãn theo kênh đầu tư liên quan (VN-Index, vàng, bất động sản, ngân hàng, ngoại hối) kèm chỉ số MRI (Market Reaction Index) — thể hiện mức độ tích cực/tiêu cực mà tin có thể tạo ra với từng kênh đầu tư. Đây là thông tin tham khảo, không phải lời khuyên đầu tư.</p>

            <h2>Agent Market — Kho Knowledge &amp; Skill cho AI Agent</h2>
            <p>Chợ knowledge pack (.md/.json/.yaml) giúp lập trình viên xây dựng AI agent về tài chính Việt Nam: dữ liệu vĩ mô, ngữ cảnh thị trường và prompt mẫu sẵn dùng. Có gói miễn phí và gói trả phí từ người bán đã xác minh.</p>

            <h2>Về Viet Dataverse</h2>
            <p>Viet Dataverse là nền tảng dữ liệu kinh tế Việt Nam mã nguồn mở, cung cấp thông tin giá vàng, giá bạc, lãi suất ngân hàng và tỷ giá hối đoái được thu thập tự động từ các nguồn công khai uy tín. Dữ liệu được làm sạch, chuẩn hóa và lưu trữ lịch sử dài hạn để phục vụ nghiên cứu và phân tích. Liên hệ: <a href="mailto:contact@vietdataverse.online">contact@vietdataverse.online</a></p>
