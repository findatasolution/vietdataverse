name: Gold & Silver Price Crawl (2x Daily)

on:
  schedule:
    # Morning: 8:30 AM VN (1:30 AM UTC)
    - cron: '30 1 * * *'
    # Afternoon: 2:30 PM VN (7:30 AM UTC)
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  crawl-gold-silver:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r crawl_tools/requirements.txt

    - name: Run gold & silver crawler
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GLOBAL_INDICATOR_DB: ${{ secrets.GLOBAL_INDICATOR_DB }}
        HELPER_DB: ${{ secrets.HELPER_DB }}
      run: |
        cd crawl_tools
        python crawl_gold_silver.py

    - name: Trigger webhooks (gold + silver)
      # always(): gold/silver are persisted before the global section can fail the
      # job, and the payload is just a refresh trigger (data: []), so decouple these
      # notifications from a Yahoo Finance/global outage.
      if: always()
      env:
        WEBHOOK_INTERNAL_SECRET: ${{ secrets.WEBHOOK_INTERNAL_SECRET }}
        API_BASE: https://api.vietdataverse.online
      run: |
        for event in gold silver; do
          curl -sf -X POST "${API_BASE}/api/v1/internal/webhooks/trigger" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Secret: ${WEBHOOK_INTERNAL_SECRET}" \
            -d "{\"event\": \"${event}\", \"data\": []}" \
            && echo "✅ Webhook trigger: ${event}" \
            || echo "⚠️ Webhook trigger failed for ${event} (non-critical)"
        done

    - name: Show results
      if: always()
      run: echo "Gold & silver price crawl completed at $(date)"
