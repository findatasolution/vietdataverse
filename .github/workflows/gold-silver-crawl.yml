name: Gold & Silver Price Crawl (Daily + hourly retry)

on:
  schedule:
    # Primary daily run: 8:30 AM VN (1:30 AM UTC)
    - cron: '30 1 * * *'
    # Hourly retry 9:30 AM–4:30 PM VN (2:30–9:30 AM UTC). The "skip if already
    # crawled" guard below makes these no-ops once the day's data has landed, so
    # they effectively retry hourly ONLY while today's gold/silver is still missing.
    - cron: '30 2-9 * * *'
  workflow_dispatch:
    inputs:
      force_global:
        description: "Run crawler even when today's domestic and global data are fresh"
        required: false
        type: boolean
        default: false

jobs:
  crawl-gold-silver:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Skip if domestic and global data are already fresh
      id: guard
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GLOBAL_INDICATOR_DB: ${{ secrets.GLOBAL_INDICATOR_DB }}
        FORCE_GLOBAL: ${{ inputs.force_global || false }}
      run: |
        pip install -q psycopg2-binary
        python - <<'PY'
        import os, datetime, psycopg2
        today = datetime.date.today().isoformat()
        conn = psycopg2.connect(os.environ['CRAWLING_BOT_DB'])
        cur = conn.cursor()
        cur.execute(
            "SELECT (SELECT COUNT(*) FROM vn_macro_gold_daily   WHERE date = %s),"
            "       (SELECT COUNT(*) FROM vn_macro_silver_daily WHERE date = %s)",
            (today, today),
        )
        gold_rows, silver_rows = cur.fetchone()
        conn.close()

        global_conn = psycopg2.connect(os.environ['GLOBAL_INDICATOR_DB'])
        global_cur = global_conn.cursor()
        global_cur.execute(
            "SELECT MAX(date) FILTER (WHERE gold_price IS NOT NULL), "
            "MAX(date) FILTER (WHERE silver_price IS NOT NULL), "
            "MAX(date) FILTER (WHERE nasdaq_price IS NOT NULL), "
            "MAX(date) FILTER (WHERE sp500_price IS NOT NULL), "
            "MAX(date) FILTER (WHERE dowjones_price IS NOT NULL) "
            "FROM global_macro"
        )
        latest_global_dates = global_cur.fetchone()
        global_conn.close()

        domestic_done = gold_rows > 0 and silver_rows > 0
        # Four calendar days covers weekends and US market holidays while still
        # forcing retries for a genuinely stale weekday feed.
        freshness_floor = datetime.date.fromisoformat(today) - datetime.timedelta(days=4)
        global_done = all(d is not None and d >= freshness_floor for d in latest_global_dates)
        done = "true" if (domestic_done and global_done) else "false"
        if os.environ.get('FORCE_GLOBAL', '').lower() == 'true':
            done = "false"
            print("force_global=true -> bypass freshness guard")
        print(
            f"today={today} gold_rows={gold_rows} silver_rows={silver_rows} "
            f"global_latest={latest_global_dates} floor={freshness_floor} "
            f"-> done={done}"
        )
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"done={done}\n")
        PY

    - name: Install dependencies
      if: steps.guard.outputs.done != 'true'
      run: pip install -r crawl_tools/requirements.txt

    - name: Run gold & silver crawler
      if: steps.guard.outputs.done != 'true'
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GLOBAL_INDICATOR_DB: ${{ secrets.GLOBAL_INDICATOR_DB }}
        HELPER_DB: ${{ secrets.HELPER_DB }}
      run: |
        cd crawl_tools
        python crawl_gold_silver.py

    - name: Trigger webhooks (gold + silver)
      # Only when a fresh crawl actually ran. gold/silver are persisted before the
      # global section can fail the job, and the payload is just a refresh trigger.
      if: steps.guard.outputs.done != 'true'
      env:
        WEBHOOK_INTERNAL_SECRET: ${{ secrets.WEBHOOK_INTERNAL_SECRET }}
        API_BASE: https://api.vietdataverse.online
      run: |
        if [ -z "$WEBHOOK_INTERNAL_SECRET" ]; then
          echo "Webhook delivery disabled: WEBHOOK_INTERNAL_SECRET is not configured"
          exit 0
        fi
        for event in gold silver; do
          curl -sf -X POST "${API_BASE}/api/v1/internal/webhooks/trigger" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Secret: ${WEBHOOK_INTERNAL_SECRET}" \
            -d "{\"event\": \"${event}\", \"data\": []}" \
            && echo "✅ Webhook trigger: ${event}" \
            || echo "⚠️ Webhook trigger failed for ${event} (non-critical)"
        done

    - name: Show results
      if: always()
      run: |
        if [ "${{ steps.guard.outputs.done }}" = "true" ]; then
          echo "Today's gold & silver already present — skipped crawl at $(date)"
        else
          echo "Gold & silver price crawl completed at $(date)"
        fi
