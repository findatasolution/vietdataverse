name: GSO Macro Data Crawl (Monthly/Quarterly)

on:
  schedule:
    # Monthly CPI/PPI/Trade/IIP: 28th of each month at 02:00 UTC (9AM VN)
    - cron: '0 2 28 * *'
    # GDP: last day of Mar, Jun, Sep, Dec at 03:00 UTC
    - cron: '0 3 31 3,12 *'
    - cron: '0 3 30 6,9 *'
  workflow_dispatch:

jobs:
  crawl-gso-monthly:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r crawl_tools/requirements.txt

    - name: Crawl GSO CPI & PPI
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawl_tools/crawl_gso_cpi.py

    - name: Crawl GSO Trade (Import/Export)
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawl_tools/crawl_gso_trade.py

    - name: Crawl GSO Industry (IIP)
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawl_tools/crawl_gso_industry.py

    - name: Show results
      if: always()
      run: echo "GSO monthly crawl completed at $(date)"

  crawl-gso-gdp:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r crawl_tools/requirements.txt

    - name: Crawl GSO GDP
      env:
        CRAWLING_BOT_DB: ${{ secrets.CRAWLING_BOT_DB }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawl_tools/crawl_gso_gdp.py

    - name: Show results
      if: always()
      run: echo "GSO GDP crawl completed at $(date)"
