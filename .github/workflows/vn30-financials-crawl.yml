name: VN30 Profile Crawl (Monthly — any IP)

# NOTE: crawl_vn30_financials.py and crawl_vn30_ratios.py require VN IP
# and are scheduled via macOS launchd on local Mac (~/Library/LaunchAgents/).
# Only crawl_vn30_profile.py runs here — KBS source works from any IP.

on:
  schedule:
    # Company profile refresh: 1st of each month at 07:00 UTC
    - cron: '0 7 1 * *'
  workflow_dispatch:

jobs:
  crawl-vn30-profile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r crawl_tools/requirements.txt

    - name: Run VN30 company profile crawler
      env:
        CRAWLING_CORP_DB: ${{ secrets.CRAWLING_CORP_DB }}
      run: |
        cd crawl_tools
        python crawl_vn30_profile.py

    - name: Show results
      if: always()
      run: echo "VN30 profile crawl completed at $(date)"
