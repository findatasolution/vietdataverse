name: API Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'be/**'
      - '.github/workflows/api-smoke-test.yml'
  schedule:
    # 9:00 AM VN (2:00 AM UTC) ‚Äî sau khi crawlers ch·∫°y xong l√∫c 8:30
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run API smoke tests
        run: |
          BASE="https://api.vietdataverse.online/api/v1"
          PASS=0
          FAIL=0
          ERRORS=""

          check() {
            local name="$1"
            local url="$2"
            local response
            local http_code
            local exit_code

            set +e
            response=$(curl -sS --max-time 15 --write-out $'\n%{http_code}' "$url" 2>&1)
            exit_code=$?
            set -e

            if [ $exit_code -ne 0 ]; then
              echo "‚ùå $name ‚Äî transport failed (curl exit $exit_code)"
              ERRORS="$ERRORS\n  ‚ùå $name: transport error $exit_code"
              FAIL=$((FAIL + 1))
              return
            fi

            http_code=$(printf '%s\n' "$response" | tail -n 1)
            response=$(printf '%s\n' "$response" | sed '$d')
            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "‚ùå $name ‚Äî HTTP $http_code"
              ERRORS="$ERRORS\n  ‚ùå $name: HTTP $http_code"
              FAIL=$((FAIL + 1))
              return
            fi

            local success
            success=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',''))" 2>/dev/null)
            local count
            count=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('data',[])))" 2>/dev/null)

            if [ "$success" = "True" ] && [ "${count:-0}" -gt 0 ]; then
              echo "‚úÖ $name ‚Äî $count rows"
              PASS=$((PASS + 1))
            else
              echo "‚ùå $name ‚Äî success=$success rows=$count"
              ERRORS="$ERRORS\n  ‚ùå $name: success=$success rows=$count"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "=== Viet Dataverse API Smoke Test ==="
          echo "Base: $BASE"
          echo ""

          check "Gold (DOJI HN)"     "$BASE/gold?type=DOJI%20HN&period=7d"
          check "Silver"             "$BASE/silver?period=7d"
          check "SBV Rate (VCB)"     "$BASE/sbv-rate?bank=VCB&period=7d"
          check "Term Deposit (ACB)" "$BASE/termdepo?bank=ACB&period=7d"
          check "CPI"                "$BASE/macro/cpi?period=1y"
          check "Global (XAU/USD)"   "$BASE/global?symbol=GC%3DF&period=7d"

          echo ""
          echo "=== Summary: $PASS passed, $FAIL failed ==="

          if [ $FAIL -gt 0 ]; then
            echo -e "Failed endpoints:$ERRORS"
            exit 1
          fi
