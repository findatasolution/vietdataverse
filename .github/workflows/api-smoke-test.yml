name: API Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'be/**'
      - '.github/workflows/api-smoke-test.yml'
  schedule:
    # 9:00 AM VN (2:00 AM UTC) — sau khi crawlers chạy xong lúc 8:30
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run API smoke tests
        run: |
          API_ORIGIN="https://api.vietdataverse.online"
          DATA_BASE="$API_ORIGIN/fe/data"
          PASS=0
          FAIL=0
          ERRORS=""

          request() {
            local url="$1"
            set +e
            RESPONSE=$(curl -sS --max-time 20 --write-out $'\n%{http_code}' "$url" 2>&1)
            CURL_EXIT=$?
            set -e
            HTTP_CODE=$(printf '%s\n' "$RESPONSE" | tail -n 1)
            RESPONSE=$(printf '%s\n' "$RESPONSE" | sed '$d')
          }

          pass() {
            echo "✅ $1"
            PASS=$((PASS + 1))
          }

          fail() {
            local name="$1"
            local reason="$2"
            echo "❌ $name — $reason"
            ERRORS="$ERRORS\n  ❌ $name: $reason"
            FAIL=$((FAIL + 1))
          }

          check_static() {
            local name="$1"
            local file="$2"
            request "$DATA_BASE/$file"
            if [ "$CURL_EXIT" -ne 0 ]; then
              fail "$name" "transport error $CURL_EXIT"
              return
            fi
            if [ "$HTTP_CODE" != "200" ]; then
              fail "$name" "HTTP $HTTP_CODE"
              return
            fi
            if printf '%s' "$RESPONSE" | python3 -c '
          import json, sys
          doc = json.load(sys.stdin)
          payload = doc.get("data")
          if not isinstance(payload, (dict, list)) or not payload:
              raise SystemExit(1)
          ' 2>/dev/null; then
              pass "$name — static JSON non-empty"
            else
              fail "$name" "invalid or empty static JSON"
            fi
          }

          echo "=== Viet Dataverse API Smoke Test ==="
          echo "API: $API_ORIGIN"
          echo ""

          request "$API_ORIGIN/api/health"
          if [ "$CURL_EXIT" -eq 0 ] && [ "$HTTP_CODE" = "200" ] && \
             printf '%s' "$RESPONSE" | python3 -c 'import json,sys; assert json.load(sys.stdin).get("status") == "healthy"' 2>/dev/null; then
            pass "API health"
          else
            fail "API health" "transport=$CURL_EXIT HTTP=$HTTP_CODE"
          fi

          # Metered endpoints intentionally reject anonymous requests. Verify the
          # auth boundary without borrowing a real user's API key or consuming quota.
          request "$API_ORIGIN/api/v1/gold?type=DOJI%20HN&period=7d"
          if [ "$CURL_EXIT" -eq 0 ] && [ "$HTTP_CODE" = "401" ]; then
            pass "API authentication gate — expected HTTP 401"
          else
            fail "API authentication gate" "expected 401, got transport=$CURL_EXIT HTTP=$HTTP_CODE"
          fi

          check_static "Gold (DOJI HN)"     "gold_DOJI_HN_7d.json"
          check_static "Silver"             "silver_7d.json"
          check_static "SBV rates"           "sbv_7d.json"
          check_static "Term deposit (ACB)"  "termdepo_ACB_7d.json"
          check_static "CPI"                 "cpi_monthly.json"
          check_static "Global markets"      "global_7d.json"

          echo ""
          echo "=== Summary: $PASS passed, $FAIL failed ==="

          if [ $FAIL -gt 0 ]; then
            echo -e "Failed endpoints:$ERRORS"
            exit 1
          fi
